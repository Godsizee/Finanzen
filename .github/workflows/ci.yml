name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    name: Verify Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint & Prettier checks
        run: npm run lint

      - name: Svelte Type-Check
        run: npm run check

      - name: Test production build
        run: npm run build
        env:
          PUBLIC_POCKETBASE_URL: https://pocketbase-finanzen.dasdann.jetzt
